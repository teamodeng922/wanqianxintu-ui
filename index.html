<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万千心途 · UI 状态</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="game-container" class="game-stage" data-current-screen="1" aria-label="万千心途 UI 预览">
    <div class="scene-background" aria-hidden="true"></div>
    <div class="gradient-overlay" aria-hidden="true"></div>

    <button class="ui-icon global-back" type="button" aria-label="返回">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="34,10 18,28 34,46"/>
      </svg>
    </button>

    <button class="ui-icon global-forward" type="button" aria-label="快进">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="28" cy="28" r="20"/>
        <polyline points="20,20 28,28 20,36"/>
        <polyline points="29,20 37,28 29,36"/>
      </svg>
    </button>

    <section class="screen screen-story is-active" data-screen="1" aria-label="剧情对话界面">
      <div class="memory-toast story-toast" data-toast role="status" aria-live="polite">
        <svg class="memory-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D4B886" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2 L20 12 L12 22 L4 12 Z"/>
        </svg>
        <span>收集记忆碎片：指尖温度</span>
      </div>

      <button class="interaction-indicator story-overlay" data-overlay="interaction" type="button" aria-label="互动点击" hidden>
        <span class="interaction-ring" aria-hidden="true">
          <img src="Assets/icon_hand.svg" width="56" height="56" style="opacity: 0.7; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));" alt="tap">
        </span>
      </button>

      <section class="dialogue-area story-dialogue" data-story-dialogue aria-label="当前对话"></section>

      <p class="monologue story-overlay" data-overlay="monologue" hidden></p>
    </section>

    <section class="screen screen-choice" data-screen="2" aria-label="选项选择界面">
      <section class="dialogue-area" data-choice-context aria-label="当前对话"></section>

      <div class="choice-list" data-choice-list></div>
    </section>

    <section class="screen screen-subtitle" data-screen="3" aria-label="过场字幕">
      <div class="subtitle-lines" data-subtitle-lines></div>
    </section>

    <section class="screen screen-map" data-screen="4" aria-label="全息地图路线选择">
      <img class="map-background" src="Assets/map_hologram.png" alt="" aria-hidden="true" onerror="this.hidden = true;">
      <div class="map-particles" data-map-particles aria-hidden="true"></div>

      <button class="ui-icon map-close" type="button" data-map-close aria-label="关闭地图">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <line x1="14" y1="14" x2="34" y2="34"/>
          <line x1="34" y1="14" x2="14" y2="34"/>
        </svg>
      </button>

      <div class="building-label" style="left: 18%; top: 22%; --label-order: 0;">
        <span class="building-name">图书馆</span>
      </div>
      <div class="building-label" style="left: 30%; top: 38%; --label-order: 1;">
        <span class="building-name">行政楼</span>
      </div>
      <div class="building-label" style="left: 48%; top: 35%; --label-order: 2;">
        <span class="building-name">主教学楼</span>
      </div>
      <div class="building-label" style="left: 52%; top: 18%; --label-order: 3;">
        <span class="building-name">礼堂</span>
      </div>
      <div class="building-label" style="left: 68%; top: 20%; --label-order: 4;">
        <span class="building-name">花园</span>
      </div>
      <div class="building-label" style="left: 78%; top: 38%; --label-order: 5;">
        <span class="building-name">体育馆</span>
      </div>
      <div class="building-label" style="right: 20%; top: 72%; --label-order: 6;">
        <span class="building-name">操场</span>
      </div>

      <div class="map-avatar-layer" data-map-avatars></div>
    </section>
  </main>

  <script src="js/Router.js"></script>
  <script src="js/GameUI.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
